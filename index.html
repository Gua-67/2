<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>单词消消乐 · 闯关金币版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            background: linear-gradient(145deg, #1a472a, #0e2a1a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
            transition: background 0.3s;
        }
        /* 主题变量 */
        body.theme-sakura { --bg-start: #f8b0b0; --bg-end: #f5a0a0; --panel-bg: rgba(255,240,245,0.96); --card-front: #fff0f5; --card-back: #f4c2c2; --matched-bg: #f0b0b0; --btn-bg: #e68484; --btn-shadow: #b55a5a; --stat-bg: #c07a7a; --message-bg: #fff0f0; --map-bg: #ffe4e9; --node-bg: #ffb7b7; }
        body.theme-ocean { --bg-start: #0b3b5f; --bg-end: #062235; --panel-bg: rgba(220,240,255,0.95); --card-front: #d4eaff; --card-back: #2c6e9e; --matched-bg: #6aa9cf; --btn-bg: #1f7a8c; --btn-shadow: #0e4a57; --stat-bg: #1f3a4b; --message-bg: #cfe3ff; --map-bg: #cdeeff; --node-bg: #5dade2; }
        body.theme-chocolate { --bg-start: #5e3a2a; --bg-end: #3e241a; --panel-bg: rgba(245,235,220,0.96); --card-front: #f7e8d4; --card-back: #a77b4d; --matched-bg: #bc9a6b; --btn-bg: #b97f44; --btn-shadow: #7a521f; --stat-bg: #634d2e; --message-bg: #f2e3c9; --map-bg: #e7d7be; --node-bg: #c28b40; }
        body { background: linear-gradient(145deg, var(--bg-start, #1a472a), var(--bg-end, #0e2a1a)); }
        .view { display: none; max-width: 1000px; width: 100%; }
        .view.active { display: block; }
        .game-container, .home-container, .shop-container {
            background: var(--panel-bg, rgba(255,248,225,0.95));
            border-radius: 56px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.4);
            padding: 20px 24px 30px;
        }
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stats {
            display: flex;
            gap: 16px;
            background: var(--stat-bg, #2e241f);
            padding: 6px 18px;
            border-radius: 60px;
            color: #ffefcf;
            font-weight: bold;
        }
        .stat .value { font-size: 1.4rem; font-weight: 800; color: #ffcf4a; }
        .icon-btn {
            background: var(--btn-bg, #ff884d);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 3px 0 var(--btn-shadow, #aa4f1c);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .icon-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--btn-shadow, #aa4f1c); }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin: 20px 0;
        }
        .card {
            aspect-ratio: 1;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            background: var(--card-front, linear-gradient(135deg, #fff3df, #ffe6c7));
            box-shadow: 0 10px 15px -6px rgba(0,0,0,0.3);
            padding: 8px;
            transition: 0.1s;
        }
        .card.back {
            background: var(--card-back, repeating-linear-gradient(45deg, #4b6b3e, #4b6b3e 12px, #3e5a32 12px, #3e5a32 24px));
            color: #f9eec1;
            font-size: 2rem;
        }
        .card.matched {
            background: var(--matched-bg, #9bc48b);
            text-decoration: line-through;
            opacity: 0.75;
            transform: scale(0.97);
            cursor: default;
        }
        .card.matched::after { content: " ✓"; font-size: 1.2rem; }
        .message-area {
            text-align: center;
            background: var(--message-bg, #fff1cf);
            padding: 8px;
            border-radius: 60px;
            font-weight: bold;
            color: #dd7230;
            margin-top: 10px;
        }
        .map-container {
            background: var(--map-bg, #f0e5d2);
            border-radius: 48px;
            padding: 20px;
            margin: 20px 0;
            overflow-x: auto;
        }
        .map {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .map-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }
        .map-node {
            text-align: center;
            width: 80px;
            cursor: pointer;
        }
        .map-node.locked { filter: grayscale(0.5); cursor: not-allowed; }
        .node-circle {
            width: 60px;
            height: 60px;
            background: var(--node-bg, #ffd966);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            margin: 0 auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border: 2px solid #fff;
        }
        .star-display i { color: gold; }
        .hero-icon { font-size: 1.8rem; margin-top: 5px; }
        .shop-items { display: flex; flex-wrap: wrap; gap: 20px; margin: 20px 0; }
        .shop-item {
            background: var(--message-bg, #fff1cf);
            border-radius: 32px;
            padding: 12px;
            width: 160px;
            text-align: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }
        .skin-preview {
            width: 80px;
            height: 80px;
            margin: 0 auto 8px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        .buy-btn {
            background: var(--btn-bg, #ff884d);
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            margin-top: 8px;
        }
        /* 词库管理折叠面板 */
        .wordbank-panel {
            margin-top: 20px;
            background: var(--message-bg, #fff1cf);
            border-radius: 40px;
            padding: 0;
            overflow: hidden;
            transition: all 0.3s;
        }
        .wordbank-header {
            background: var(--btn-bg, #ff884d);
            padding: 12px 20px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .wordbank-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            padding: 0 20px;
        }
        .wordbank-content.open {
            max-height: 500px;
            padding: 16px 20px;
        }
        .add-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .add-form input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 30px;
            border: 1px solid #ccc;
        }
        .word-list {
            max-height: 200px;
            overflow-y: auto;
            background: rgba(255,255,200,0.3);
            border-radius: 28px;
            padding: 8px;
        }
        .word-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            border-bottom: 1px solid #ddd;
            font-size: 0.9rem;
        }
        .delete-word {
            background: #ff8866;
            border: none;
            border-radius: 20px;
            padding: 2px 10px;
            color: white;
            cursor: pointer;
        }
        .upload-area {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .upload-label {
            background: var(--btn-bg, #ff884d);
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        @media (max-width: 600px) {
            .game-grid { gap: 8px; }
            .map-node { width: 60px; }
            .node-circle { width: 45px; height: 45px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <!-- 主页视图 -->
    <div id="homeView" class="view active">
        <div class="home-container">
            <div class="header-bar">
                <div class="title-area"><h1>🗺️ 单词冒险岛</h1></div>
                <div class="stats">
                    <div class="stat"><span>🪙 金币</span><span class="value" id="totalCoins">0</span></div>
                </div>
                <button id="homeSettingsBtn" class="icon-btn">⚙️</button>
            </div>
            <div class="map-container"><div id="mapView" class="map"></div></div>
            <div style="display: flex; gap: 15px; justify-content: center; margin-bottom: 20px;">
                <button id="startGameFromHome" class="icon-btn">▶️ 开始当前关卡</button>
                <button id="openShopBtn" class="icon-btn">🛒 商店</button>
                <button id="toggleWordBankBtn" class="icon-btn">📚 词库管理</button>
            </div>
            <!-- 词库管理折叠面板 -->
            <div class="wordbank-panel" id="wordbankPanel">
                <div class="wordbank-header" id="wordbankHeader">
                    <span>📖 单词库管理</span>
                    <span>▼</span>
                </div>
                <div class="wordbank-content" id="wordbankContent">
                    <div class="upload-area">
                        <input type="file" id="excelUpload" accept=".xlsx,.xls,.csv" style="display:none;">
                        <button class="upload-label" id="uploadExcelBtn">📂 上传Excel</button>
                        <span id="fileNameDisplay" style="font-size:0.8rem;">未选择文件</span>
                        <button class="icon-btn" id="importExcelBtn" style="background:#3c8d2f;">➕ 导入并添加</button>
                    </div>
                    <div class="add-form">
                        <input type="text" id="wordInput" placeholder="英文/单词">
                        <input type="text" id="meaningInput" placeholder="中文/释义">
                        <button class="icon-btn" id="addWordBtn" style="background:#3c8d2f;">手动添加</button>
                    </div>
                    <div class="word-list" id="wordListContainer"></div>
                    <div style="margin-top: 10px;">
                        <button id="resetDefaultBtn" class="icon-btn" style="background:#aa8866;">恢复默认词库</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 游戏视图 -->
    <div id="gameView" class="view">
        <div class="game-container">
            <div class="header-bar">
                <div class="title-area">
                    <button id="backHomeBtn" class="icon-btn">🏠</button>
                    <h1>关卡 <span id="currentLevelNum">1</span></h1>
                </div>
                <div class="stats">
                    <div class="stat"><span>🎯 剩余</span><span class="value" id="remainingPairs">8</span></div>
                    <div class="stat"><span>👣 步数</span><span class="value" id="stepCount">0</span></div>
                    <div class="stat"><span>⭐ 星级</span><span class="value" id="starDisplay">0</span></div>
                    <div class="stat"><span>🪙</span><span class="value" id="gameCoins">0</span></div>
                </div>
                <button id="gameSettingsBtn" class="icon-btn">⚙️</button>
            </div>
            <div class="game-grid" id="gameGrid"></div>
            <div class="message-area" id="messageBox">✨ 点击卡片，匹配单词 & 释义 ✨</div>
            <div class="speech-hint">🔊 点击卡片朗读</div>
        </div>
    </div>

    <!-- 商店视图 -->
    <div id="shopView" class="view">
        <div class="shop-container">
            <div class="header-bar">
                <button id="closeShopBtn" class="icon-btn">◀ 返回</button>
                <div class="stats"><div class="stat"><span>🪙 金币</span><span class="value" id="shopCoins">0</span></div></div>
            </div>
            <h2>🎴 卡片皮肤</h2>
            <div id="cardSkinsShop" class="shop-items"></div>
            <h2>🧝 主人公皮肤</h2>
            <div id="heroSkinsShop" class="shop-items"></div>
        </div>
    </div>

    <!-- 设置弹窗 -->
    <div id="settingsModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:1000; visibility:hidden; opacity:0; transition:0.2s;">
        <div style="background: var(--panel-bg, #fff8e8); border-radius:48px; padding:24px; width:90%; max-width:400px;">
            <h3>游戏设置</h3>
            <div style="margin:20px 0; display:flex; justify-content:space-between;">
                <span>🎨 主题</span>
                <select id="themeSelect">
                    <option value="default">森林绿意</option>
                    <option value="sakura">樱花粉</option>
                    <option value="ocean">海洋蓝</option>
                    <option value="chocolate">巧克力棕</option>
                </select>
            </div>
            <div style="margin:20px 0; display:flex; justify-content:space-between;">
                <span>🔊 音效</span>
                <label><input type="checkbox" id="soundToggle" checked> 开启</label>
            </div>
            <div style="margin:20px 0; display:flex; justify-content:space-between;">
                <span>🎵 背景音乐</span>
                <label><input type="checkbox" id="musicToggle"> 开启</label>
            </div>
            <button id="closeSettings" class="icon-btn" style="width:100%">关闭</button>
        </div>
    </div>

    <script>
        // ---------- 游戏配置 ----------
        const PAIRS_PER_LEVEL = [4,4,4,4,4, 6,6,6,6,6, 8,8,8,8,8,8,8,8,8,8];
        const TOTAL_LEVELS = PAIRS_PER_LEVEL.length;
        let currentLevel = 1;
        let levelStars = {};
        let totalCoins = 0;

        // 卡片皮肤 (纯CSS)
        let cardSkins = [
            { id: 0, name: "经典米色", price: 0, owned: true, style: "background: #F5E6D3;" },
            { id: 1, name: "木质纹", price: 1, owned: false, style: "background: repeating-linear-gradient(45deg, #CDA776, #CDA776 8px, #B5874A 8px, #B5874A 16px);" },
            { id: 2, name: "星空点点", price: 3, owned: false, style: "background: #0B2F6C radial-gradient(circle at 20% 40%, white 1px, transparent 1px); background-size: 12px 12px;" },
            { id: 3, name: "彩虹渐变", price: 5, owned: false, style: "background: linear-gradient(135deg, red, orange, yellow, green, blue, indigo, violet);" },
            { id: 4, name: "龙鳞纹", price: 7, owned: false, style: "background: #2F4F2F repeating-linear-gradient(45deg, #7CFC00 0px, #7CFC00 2px, #2F4F2F 2px, #2F4F2F 6px);" }
        ];
       let heroSkins = [
            { id: 0, name: "冒险小子", price: 0, owned: true, emoji: "🧒" },
            { id: 1, name: "魔法少女", price: 1, owned: false, emoji: "🧙‍♀️" },
            { id: 2, name: "机甲战士", price: 3, owned: false, emoji: "🤖" },
            { id: 3, name: "精灵王子", price: 5, owned: false, emoji: "🧝" },
            { id: 4, name: "龙骑士", price: 6, owned: false, emoji: "🐉" },
            // 新增动物/元素皮肤
            { id: 5, name: "小猫咪", price: 2, owned: false, emoji: "🐱" },
            { id: 6, name: "小狗狗", price: 2, owned: false, emoji: "🐶" },
            { id: 7, name: "小兔子", price: 2, owned: false, emoji: "🐰" },
            { id: 8, name: "小狐狸", price: 3, owned: false, emoji: "🦊" },
            { id: 9, name: "小幽灵", price: 1, owned: false, emoji: "👻" },
            { id: 10, name: "小恐龙", price: 3, owned: false, emoji: "🦖" },
            { id: 11, name: "小企鹅", price: 2, owned: false, emoji: "🐧" },
            { id: 12, name: "独角兽", price: 4, owned: false, emoji: "🦄" }
         ];
        let currentCardSkin = 0;
        let currentHeroSkin = 0;

        // 词库
        let userWordPairs = [
            { word: "Apple", translation: "苹果" }, { word: "Dog", translation: "狗" }, { word: "Cat", translation: "猫" },
            { word: "Sun", translation: "太阳" }, { word: "Moon", translation: "月亮" }, { word: "Star", translation: "星星" },
            { word: "Happy", translation: "快乐" }, { word: "Big", translation: "大" }, { word: "Small", translation: "小" },
            { word: "Fast", translation: "快" }, { word: "Slow", translation: "慢" }, { word: "Red", translation: "红" },
            { word: "Blue", translation: "蓝" }, { word: "Green", translation: "绿" }, { word: "Yellow", translation: "黄" },
            { word: "Run", translation: "跑" }, { word: "Jump", translation: "跳" }, { word: "Fly", translation: "飞" }
        ];

        // 游戏状态变量
        let currentGamePairs = [];
        let cards = [], selectedIndexes = [], lockBoard = false, timeoutId = null;
        let stepCount = 0, matchedCount = 0, remainingPairs = 0, gameFinished = false;
        let timerSeconds = 0, timerInterval = null, isTimerRunning = false;
        let soundEnabled = true, musicEnabled = false;
        let bgmAudio = null;
        let audioCtx = null;

        // ---------- 辅助函数 ----------
        function saveProgress() {
            localStorage.setItem('wordMatchAdvanced', JSON.stringify({
                levelStars, totalCoins, cardSkins, heroSkins, currentCardSkin, currentHeroSkin, userWordPairs
            }));
        }
        function loadProgress() {
            let stored = localStorage.getItem('wordMatchAdvanced');
            if(stored) {
                try {
                    let data = JSON.parse(stored);
                    levelStars = data.levelStars || {};
                    totalCoins = data.totalCoins || 0;
                    cardSkins = data.cardSkins || cardSkins;
                    heroSkins = data.heroSkins || heroSkins;
                    currentCardSkin = data.currentCardSkin || 0;
                    currentHeroSkin = data.currentHeroSkin || 0;
                    userWordPairs = data.userWordPairs || userWordPairs;
                } catch(e) {}
            }
            if(Object.keys(levelStars).length===0) levelStars[1] = 0;
            updateUIValues();
            renderWordList();
        }
        function updateUIValues() {
            document.getElementById('totalCoins').innerText = totalCoins;
            document.getElementById('gameCoins').innerText = totalCoins;
            document.getElementById('shopCoins').innerText = totalCoins;
        }
        function addCoins(amount) {
            totalCoins += amount;
            updateUIValues();
            saveProgress();
        }

        // 主题切换
        function setTheme(theme) {
            document.body.className = '';
            if(theme !== 'default') document.body.classList.add('theme-'+theme);
            localStorage.setItem('wordTheme', theme);
        }

        // 音效
        function playBeep(type) {
            if (!soundEnabled) return;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine';
            if (type === 'success') {
                osc.frequency.value = 880;
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
                osc.start(); osc.stop(now + 0.25);
            } else {
                osc.frequency.value = 440;
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
                osc.start(); osc.stop(now + 0.35);
            }
        }

        function initBGM() { if(!bgmAudio) { bgmAudio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3'); bgmAudio.loop = true; bgmAudio.volume = 0.3; } }
        function toggleMusic(enable) { if(enable) { if(!bgmAudio) initBGM(); bgmAudio.play().catch(e=>{}); } else if(bgmAudio) bgmAudio.pause(); }

        // 地图渲染
        function renderMap() {
            let mapDiv = document.getElementById('mapView');
            mapDiv.innerHTML = '';
            let rows = [];
            let perRow = 5;
            for(let i=0; i<TOTAL_LEVELS; i++) {
                let level = i+1;
                let stars = levelStars[level] || 0;
                let isUnlocked = (level===1) || (levelStars[level-1] && levelStars[level-1] >= 2);
                let node = document.createElement('div');
                node.className = 'map-node' + (isUnlocked ? '' : ' locked');
                node.onclick = () => { if(isUnlocked) { currentLevel = level; startGameWithLevel(); } };
                node.innerHTML = `<div class="node-circle">${level}</div><div class="star-display">${'⭐'.repeat(stars)}</div>`;
                let heroSpan = document.createElement('div');
                heroSpan.className = 'hero-icon';
                if(isUnlocked && level === currentLevel) {
                    heroSpan.innerText = heroSkins[currentHeroSkin].emoji;
                }
                node.appendChild(heroSpan);
                if(!rows[Math.floor(i/perRow)]) rows[Math.floor(i/perRow)] = [];
                rows[Math.floor(i/perRow)].push(node);
            }
            rows.forEach(row => { let rowDiv = document.createElement('div'); rowDiv.className = 'map-row'; row.forEach(n => rowDiv.appendChild(n)); mapDiv.appendChild(rowDiv); });
        }

        // 游戏核心
        function getCurrentPairsCount() { return PAIRS_PER_LEVEL[currentLevel-1]; }
        function startGameWithLevel() {
            let pairsNeeded = getCurrentPairsCount();
            if(userWordPairs.length < pairsNeeded) { alert(`词库不足${pairsNeeded}对，请添加单词！`); return; }
            let shuffled = [...userWordPairs];
            for(let i=shuffled.length-1;i>0;i--) { let j=Math.floor(Math.random()*(i+1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; }
            currentGamePairs = shuffled.slice(0, pairsNeeded);
            resetGameByCurrentPairs();
            switchView('game');
        }
        function resetGameByCurrentPairs() {
            if(timeoutId) clearTimeout(timeoutId);
            lockBoard = false; selectedIndexes = []; gameFinished = false;
            stepCount = 0; matchedCount = 0; remainingPairs = getCurrentPairsCount();
            updateStatsUI();
            stopTimer(); timerSeconds = 0; isTimerRunning = false;
            document.getElementById('timerDisplay').innerText = "0";
            cards = buildCardsFromPairs(currentGamePairs);
            renderGrid();
            document.getElementById('messageBox').innerHTML = `关卡${currentLevel} · 匹配 ${remainingPairs} 对单词！`;
            document.getElementById('currentLevelNum').innerText = currentLevel;
            document.getElementById('remainingPairs').innerText = remainingPairs;
            document.getElementById('starDisplay').innerText = "0";
        }
        function buildCardsFromPairs(pairs) {
            let newCards = [], uid=0;
            for(let i=0;i<pairs.length;i++) {
                newCards.push({id:uid++, pairId:i, text:pairs[i].word, matched:false, isOpen:false});
                newCards.push({id:uid++, pairId:i, text:pairs[i].translation, matched:false, isOpen:false});
            }
            for(let i=newCards.length-1;i>0;i--) { let j=Math.floor(Math.random()*(i+1)); [newCards[i], newCards[j]] = [newCards[j], newCards[i]]; }
            return newCards;
        }
        function renderGrid() {
            let grid = document.getElementById('gameGrid');
            grid.innerHTML = '';
            let skin = cardSkins[currentCardSkin];
            for(let i=0;i<cards.length;i++) {
                let c = cards[i];
                let div = document.createElement('div');
                div.className = 'card';
                div.setAttribute('data-index',i);
                if(c.matched) {
                    div.classList.add('matched');
                    div.innerText = c.text;
                } else if(c.isOpen) {
                    div.classList.add('front');
                    div.innerText = c.text;
                    if(skin.style && skin.id !== 0) div.style.cssText = skin.style;
                } else {
                    div.classList.add('back');
                    div.innerText = '?';
                    if(skin.style && skin.id !== 0) div.style.cssText = skin.style;
                }
                grid.appendChild(div);
            }
        }
        function onCardClick(e) {
            let target = e.target.closest('.card');
            if(!target) return;
            let idx = parseInt(target.dataset.index);
            if(isNaN(idx) || gameFinished || lockBoard) return;
            let card = cards[idx];
            if(card.matched || card.isOpen) { if(card.text && card.text!=='?') speakText(card.text); return; }
            if(!isTimerRunning && !gameFinished) startTimer();
            if(selectedIndexes.length >= 2) return;
            card.isOpen = true;
            renderGrid();
            selectedIndexes.push(idx);
            if(selectedIndexes.length === 2) {
                stepCount++;
                updateStatsUI();
                let [i1,i2] = selectedIndexes;
                if(cards[i1].pairId === cards[i2].pairId) {
                    playBeep('success');
                    cards[i1].matched = true; cards[i2].matched = true;
                    cards[i1].isOpen = false; cards[i2].isOpen = false;
                    matchedCount++; remainingPairs--;
                    updateStatsUI();
                    selectedIndexes = [];
                    renderGrid();
                    if(matchedCount === getCurrentPairsCount()) endGameWithStars();
                } else {
                    playBeep('error');
                    lockBoard = true;
                    timeoutId = setTimeout(() => {
                        if(!cards[i1].matched) cards[i1].isOpen = false;
                        if(!cards[i2].matched) cards[i2].isOpen = false;
                        selectedIndexes = [];
                        renderGrid();
                        lockBoard = false;
                        timeoutId = null;
                    }, 700);
                }
            }
        }
        function speakText(text) { if(window.speechSynthesis) { let u = new SpeechSynthesisUtterance(text); u.lang = /[\u4e00-\u9fa5]/.test(text)?'zh-CN':'en-US'; window.speechSynthesis.speak(u); } }
        function startTimer() { if(timerInterval) clearInterval(timerInterval); isTimerRunning=true; timerInterval = setInterval(()=>{ if(isTimerRunning && !gameFinished) { timerSeconds++; document.getElementById('timerDisplay').innerText = timerSeconds; } },1000); }
        function stopTimer() { if(timerInterval) clearInterval(timerInterval); isTimerRunning=false; }
        function updateStatsUI() { document.getElementById('remainingPairs').innerText = remainingPairs; document.getElementById('stepCount').innerText = stepCount; }
        function endGameWithStars() {
            if(gameFinished) return;
            gameFinished = true; stopTimer();
            let baseSteps = getCurrentPairsCount() * 3;
            let star = stepCount <= baseSteps ? 3 : (stepCount <= baseSteps*1.8 ? 2 : 1);
            document.getElementById('starDisplay').innerText = star;
            if(!levelStars[currentLevel] || star > levelStars[currentLevel]) levelStars[currentLevel] = star;
            if(star === 3) {
                addCoins(1);
                document.getElementById('messageBox').innerHTML = `🏆 三星通关！获得 1 金币！${'⭐'.repeat(star)}`;
            } else {
                document.getElementById('messageBox').innerHTML = `🏆 通关！获得 ${star} 星，继续加油！${'⭐'.repeat(star)}`;
            }
            saveProgress();
            renderMap();
            setTimeout(()=>{ if(document.getElementById('messageBox')) document.getElementById('messageBox').innerHTML = "✨ 点击卡片，匹配单词 & 释义 ✨"; }, 2000);
        }

        // 商店渲染
        function renderShop() {
            let cardContainer = document.getElementById('cardSkinsShop');
            cardContainer.innerHTML = '';
            cardSkins.forEach(skin => {
                let div = document.createElement('div'); div.className = 'shop-item';
                let preview = document.createElement('div');
                preview.className = 'skin-preview';
                preview.style.cssText = skin.style;
                preview.innerText = skin.id===0 ? '📄' : (skin.id===1 ? '🪵' : (skin.id===2 ? '✨' : (skin.id===3 ? '🌈' : '🐉')));
                div.appendChild(preview);
                let nameSpan = document.createElement('div'); nameSpan.innerText = skin.name;
                let priceSpan = document.createElement('div'); priceSpan.innerText = `💰 ${skin.price}`;
                div.appendChild(nameSpan); div.appendChild(priceSpan);
                let btn = document.createElement('button');
                btn.className = 'buy-btn';
                btn.innerText = skin.owned ? '已拥有' : '购买';
                btn.disabled = skin.owned;
                btn.onclick = () => {
                    if(skin.owned) return;
                    if(totalCoins >= skin.price) {
                        totalCoins -= skin.price;
                        skin.owned = true;
                        if(skin.id === currentCardSkin) currentCardSkin = skin.id;
                        updateUIValues();
                        saveProgress();
                        renderShop();
                        alert(`购买成功！已自动装备。`);
                    } else alert("金币不足！");
                };
                div.appendChild(btn);
                cardContainer.appendChild(div);
            });
            let heroContainer = document.getElementById('heroSkinsShop');
            heroContainer.innerHTML = '';
            heroSkins.forEach((hero, idx) => {
                let div = document.createElement('div'); div.className = 'shop-item';
                let preview = document.createElement('div');
                preview.className = 'skin-preview';
                preview.style.fontSize = '3rem';
                preview.innerText = hero.emoji;
                div.appendChild(preview);
                let nameSpan = document.createElement('div'); nameSpan.innerText = hero.name;
                let priceSpan = document.createElement('div'); priceSpan.innerText = `💰 ${hero.price}`;
                div.appendChild(nameSpan); div.appendChild(priceSpan);
                let btn = document.createElement('button');
                btn.className = 'buy-btn';
                btn.innerText = hero.owned ? '已拥有' : '购买';
                btn.disabled = hero.owned;
                btn.onclick = () => {
                    if(hero.owned) return;
                    if(totalCoins >= hero.price) {
                        totalCoins -= hero.price;
                        hero.owned = true;
                        if(idx === currentHeroSkin) currentHeroSkin = idx;
                        updateUIValues();
                        saveProgress();
                        renderShop();
                        renderMap();
                        alert(`购买成功！已自动装备。`);
                    } else alert("金币不足！");
                };
                div.appendChild(btn);
                heroContainer.appendChild(div);
            });
        }

        // 词库管理UI
        function renderWordList() {
            let container = document.getElementById('wordListContainer');
            if(!container) return;
            if(userWordPairs.length===0) {
                container.innerHTML = '<div style="text-align:center; padding:12px;">暂无单词，请添加或导入Excel</div>';
                return;
            }
            let html = '';
            userWordPairs.forEach((pair, idx) => {
                html += `<div class="word-item"><span>📖 ${escapeHtml(pair.word)} → ${escapeHtml(pair.translation)}</span><button class="delete-word" data-idx="${idx}">删除</button></div>`;
            });
            container.innerHTML = html;
            document.querySelectorAll('.delete-word').forEach(btn => {
                btn.onclick = (e) => {
                    let idx = parseInt(btn.dataset.idx);
                    userWordPairs.splice(idx,1);
                    saveProgress();
                    renderWordList();
                };
            });
        }
        function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

        // Excel 解析
        let parsedExcelData = [];
        function handleExcelUpload(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: "" });
                if (!rows || rows.length === 0) { alert("Excel 无数据"); return; }
                let startRow = 0;
                if (rows.length>0 && rows[0].length>=2) {
                    let firstRowCol1 = String(rows[0][0]).toLowerCase();
                    let firstRowCol2 = String(rows[0][1]).toLowerCase();
                    if (firstRowCol1.includes('word') || firstRowCol1.includes('英文') || firstRowCol1.includes('单词') ||
                        firstRowCol2.includes('meaning') || firstRowCol2.includes('中文') || firstRowCol2.includes('释义')) {
                        startRow = 1;
                    }
                }
                let newPairs = [];
                for(let i=startRow; i<rows.length; i++) {
                    let row = rows[i];
                    if(!row || row.length<2) continue;
                    let word = row[0] ? String(row[0]).trim() : "";
                    let translation = row[1] ? String(row[1]).trim() : "";
                    if(word && translation) newPairs.push({ word, translation });
                }
                if(newPairs.length===0) alert("未解析出有效单词对");
                else {
                    parsedExcelData = newPairs;
                    document.getElementById('fileNameDisplay').innerText = `已解析 ${newPairs.length} 对`;
                }
            };
            reader.readAsArrayBuffer(file);
        }
        function importExcelToWordBank() {
            if(!parsedExcelData || parsedExcelData.length===0) { alert("请先上传并解析Excel文件"); return; }
            let added = 0;
            for(let p of parsedExcelData) {
                if(!userWordPairs.some(ex => ex.word===p.word && ex.translation===p.translation)) {
                    userWordPairs.push(p);
                    added++;
                }
            }
            if(added>0) {
                saveProgress();
                renderWordList();
                alert(`成功导入 ${added} 对新单词`);
            } else alert("没有新增单词（可能已存在）");
            parsedExcelData = [];
            document.getElementById('fileNameDisplay').innerText = "未选择文件";
            document.getElementById('excelUpload').value = "";
        }
        function addManualWord() {
            let word = document.getElementById('wordInput').value.trim();
            let meaning = document.getElementById('meaningInput').value.trim();
            if(!word || !meaning) { alert("请填写完整"); return; }
            if(userWordPairs.some(p=>p.word===word && p.translation===meaning)) { alert("该单词对已存在"); return; }
            userWordPairs.push({ word, translation: meaning });
            saveProgress();
            renderWordList();
            document.getElementById('wordInput').value = '';
            document.getElementById('meaningInput').value = '';
        }
        function resetToDefault() {
            userWordPairs = [
                { word: "Apple", translation: "苹果" }, { word: "Dog", translation: "狗" }, { word: "Cat", translation: "猫" },
                { word: "Sun", translation: "太阳" }, { word: "Moon", translation: "月亮" }, { word: "Star", translation: "星星" },
                { word: "Happy", translation: "快乐" }, { word: "Big", translation: "大" }, { word: "Small", translation: "小" },
                { word: "Fast", translation: "快" }, { word: "Slow", translation: "慢" }, { word: "Red", translation: "红" },
                { word: "Blue", translation: "蓝" }, { word: "Green", translation: "绿" }, { word: "Yellow", translation: "黄" },
                { word: "Run", translation: "跑" }, { word: "Jump", translation: "跳" }, { word: "Fly", translation: "飞" }
            ];
            saveProgress();
            renderWordList();
            alert("词库已恢复默认");
        }

        function switchView(view) {
            document.getElementById('homeView').classList.toggle('active', view==='home');
            document.getElementById('gameView').classList.toggle('active', view==='game');
            document.getElementById('shopView').classList.toggle('active', view==='shop');
            if(view==='home') { renderMap(); updateUIValues(); renderWordList(); }
            if(view==='shop') { renderShop(); updateUIValues(); }
        }

        // 事件绑定
        document.getElementById('backHomeBtn').onclick = () => { if(timerInterval) stopTimer(); switchView('home'); };
        document.getElementById('startGameFromHome').onclick = () => { startGameWithLevel(); };
        document.getElementById('openShopBtn').onclick = () => switchView('shop');
        document.getElementById('closeShopBtn').onclick = () => switchView('home');
        document.getElementById('homeSettingsBtn').onclick = () => document.getElementById('settingsModal').style.visibility = 'visible';
        document.getElementById('gameSettingsBtn').onclick = () => document.getElementById('settingsModal').style.visibility = 'visible';
        document.getElementById('closeSettings').onclick = () => document.getElementById('settingsModal').style.visibility = 'hidden';
        document.getElementById('themeSelect').onchange = (e) => setTheme(e.target.value);
        document.getElementById('soundToggle').onchange = (e) => soundEnabled = e.target.checked;
        document.getElementById('musicToggle').onchange = (e) => { musicEnabled = e.target.checked; toggleMusic(musicEnabled); };
        document.getElementById('gameGrid').addEventListener('click', onCardClick);

        // 词库管理折叠面板
        const wbHeader = document.getElementById('wordbankHeader');
        const wbContent = document.getElementById('wordbankContent');
        wbHeader.onclick = () => {
            wbContent.classList.toggle('open');
            wbHeader.querySelector('span:last-child').innerText = wbContent.classList.contains('open') ? '▲' : '▼';
        };
        document.getElementById('toggleWordBankBtn').onclick = () => {
            wbContent.classList.toggle('open');
            wbHeader.querySelector('span:last-child').innerText = wbContent.classList.contains('open') ? '▲' : '▼';
        };
        document.getElementById('uploadExcelBtn').onclick = () => document.getElementById('excelUpload').click();
        document.getElementById('excelUpload').onchange = (e) => {
            if(e.target.files[0]) handleExcelUpload(e.target.files[0]);
            else document.getElementById('fileNameDisplay').innerText = "未选择文件";
        };
        document.getElementById('importExcelBtn').onclick = importExcelToWordBank;
        document.getElementById('addWordBtn').onclick = addManualWord;
        document.getElementById('resetDefaultBtn').onclick = resetToDefault;

        // 初始化
        loadProgress();
        let savedTheme = localStorage.getItem('wordTheme');
        if(savedTheme) setTheme(savedTheme);
        renderMap();
        updateUIValues();
        renderWordList();
    </script>
</body>
</html>
